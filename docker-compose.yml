version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eperpus-app
    ports:
      - "8080:80"
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: eperpus
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: eperpus_db
    volumes:
      - ./:/var/www/html
      - ./writable:/var/www/html/writable
    depends_on:
      database:
        condition: service_healthy
    networks:
      - eperpus-network
    develop:
      watch:
        - action: sync
          path: ./app
          target: /var/www/html/app
        - action: sync
          path: ./public
          target: /var/www/html/public

  database:
    image: mysql:8.0
    container_name: eperpus-database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: eperpus
      MYSQL_PASSWORD: ${DB_PASSWORD:-password123}
      MYSQL_DATABASE: eperpus_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eperpus-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: eperpus-phpmyadmin
    environment:
      PMA_HOST: database
      PMA_USER: eperpus
      PMA_PASSWORD: ${DB_PASSWORD:-password123}
    ports:
      - "8888:80"
    depends_on:
      - database
    networks:
      - eperpus-network

volumes:
  mysql_data:

networks:
  eperpus-network:
    driver: bridge
